<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evaluación Sumativa N°02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <section id="loginSection" class="signin-container">
        <form id="loginForm">
          <div class="text-center">
            <img id="loginLogo" src="" alt="Logo" class="mb-4" />
            <h1 class="h3 mb-3 fw-normal">Iniciar sesión</h1>
          </div>
          <div id="loginAlert" class="alert alert-danger alert-dismissible fade show d-none" role="alert" style="display:none;">
            <div id="loginAlertMessage" class="mb-0"></div>
          </div>
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" placeholder="Usuario" autocomplete="username" />
            <label for="username">Usuario</label>
          </div>
          <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" placeholder="Contraseña" autocomplete="current-password" />
            <label for="password">Contraseña</label>
          </div>
          <button class="w-100 btn btn-lg btn-primary" type="submit">Ingresar</button>
          <p class="mt-3 text-muted text-center">Usuario guardado: <strong>Lucas</strong> / Contraseña: <strong>evaluacion02</strong></p>
        </form>
      </section>

      <section id="dashboardSection">
        <div class="d-flex justify-content-between align-items-center mt-4">
          <div>
            <p class="text-muted">Bienvenido, <span id="dashboardUser"></span></p>
          </div>
          <button id="logoutButton" class="btn btn-outline-secondary">Cerrar sesión</button>
        </div>

        <div id="dashboardMain" class="row g-4 align-items-start">
          <div class="col-lg-4">
            <button id="actionButton" class="btn btn-primary btn-lg w-100">Presióname (15)</button>
          </div>
          <div class="col-lg-8">
            <div id="cardContainer" class="card card-custom border-primary">
              <div id="cardHeader" class="card-header bg-primary text-white">Fase 1: Inicio</div>
              <div class="card-body">
                <img id="cardImage" src="" class="img-fluid rounded mb-3" alt="Estado" />
                <h5 id="cardTitle" class="card-title">Sistema listo para comenzar</h5>
                <p id="cardDescription" class="card-text">Este estado indica que el contador está en su valor inicial y el sistema se encuentra en condiciones normales.</p>
              </div>
              <div class="card-footer text-muted" id="cardFooter">Contador: 15</div>
            </div>
          </div>
        </div>

        <div id="dashboardFooter" class="alert alert-secondary mt-4" role="status">Estado: Normal</div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
